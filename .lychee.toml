# lychee link-checker config for RigForge docs. Run locally via `make lint-links`; in CI it runs on
# a weekly schedule (external links are flaky-by-nature, so link-checking doesn't gate PRs).
max_retries = 3
retry_wait_time = 2
timeout = 20

# GitHub is the main rate-limiter; CI passes a GITHUB_TOKEN so authenticated requests dodge the
# anonymous limit. Still accept 429 so a transient rate-limit on some other host can't fail the run.
accept = ["200..=299", "429"]

# No custom user_agent: lychee's default passes every link we have, while the old
# "Mozilla-compatible" string tripped freedesktop.org's bot detection (HTTP 418) the moment the
# config actually started loading (see the --config fix in the Makefile).

# no-color.org resolves fine in a browser but consistently times out from GitHub runner IPs
# (reproduced twice, 2026-07-11 — 0 real errors both runs, only this timeout). Exclude it rather
# than let one hostile-to-bots host fail the whole docs check; the link stays in the docs for
# human readers.
exclude = ["^https://no-color\\.org"]
