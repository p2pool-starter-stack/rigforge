name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (shellcheck + shfmt)
    runs-on: ubuntu-24.04
    env:
      SHELLCHECK_VERSION: "0.10.0"
      SHELLCHECK_SHA256: "6c881ab0698e4e6ea235245f22832860544f17ba386442fe7e9d629f8cbedf87"
      SHFMT_VERSION: "3.13.1"
      SHFMT_SHA256: "fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Install PINNED, checksum-verified shellcheck + shfmt instead of the runner's preinstalled
      # builds, so lint/format results are reproducible and don't drift with the runner image (#6).
      # Downloaded straight from the upstream releases — no `apt-get update`, avoiding the mirror
      # flakiness pithead hit in its #64.
      - name: Install pinned ShellCheck
        run: |
          set -euo pipefail
          tarball="shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/${tarball}" -o "$tarball"
          echo "${SHELLCHECK_SHA256}  ${tarball}" | sha256sum -c -
          tar -xJf "$tarball"
          sudo install "shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version
      - name: Install pinned shfmt
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -o shfmt
          echo "${SHFMT_SHA256}  shfmt" | sha256sum -c -
          sudo install shfmt /usr/local/bin/shfmt
          shfmt --version
      - name: Run ShellCheck
        run: shellcheck --severity=warning rigforge.sh util/proposed-grub.sh tests/run.sh tests/e2e/run.sh tests/e2e/in-container.sh
      - name: Run shfmt (format check)
        run: shfmt -i 4 -d rigforge.sh util/proposed-grub.sh tests/run.sh tests/e2e/run.sh tests/e2e/in-container.sh

  test:
    name: Test suite
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Ubuntu is RigForge's supported target. The suite still exercises the macOS code path here via
      # stubs (OS_TYPE=Darwin + faked sysctl), so the macOS config profile is covered without a Mac
      # runner; contributors on macOS can also run `make test` locally. jq is preinstalled on the runner.
      - name: Run test suite
        run: bash tests/run.sh

  e2e:
    name: End-to-end (Docker)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Runs the real script end-to-end inside a disposable Ubuntu container (RigForge's documented
      # Linux target), exercising the genuine Linux deploy path and /etc idempotency with real tools.
      - name: Run end-to-end suite
        run: bash tests/e2e/run.sh
