# RigForge pre-commit hooks. Install once per clone:
#
#   pipx install pre-commit   # or: pip install pre-commit
#   pre-commit install
#
# Local == CI: every lint hook calls the matching `make` target, so the Makefile's file lists and
# version pins stay the single source of truth (no duplicated config here). gitleaks is pinned to
# the same version CI runs (.github/workflows/security.yml). markdown/yaml hooks joined at commit
# time after a docs-only commit broke CI (2026-07-10) — `make lint` alone never sees .md/.yml.
# Only lychee (external-network link check) stays CI/weekly-only: `make lint-links`.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1 # keep in lockstep with GITLEAKS_VERSION in .github/workflows/security.yml
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md] # two trailing spaces is a hard line break in Markdown

  - repo: local
    hooks:
      # Reuse `make lint` rather than re-listing files, so shellcheck/shfmt run over the exact same
      # SHELL_FILES set as CI and `make lint`. Requires shellcheck + shfmt on PATH (see CONTRIBUTING).
      - id: make-lint
        name: shellcheck + shfmt (make lint)
        entry: make lint
        language: system
        files: \.sh$
        pass_filenames: false
      - id: make-lint-md
        name: markdownlint (make lint-md)
        entry: make lint-md
        language: system
        files: \.md$
        pass_filenames: false
      - id: make-lint-yaml
        name: yamllint (make lint-yaml)
        entry: make lint-yaml
        language: system
        files: \.(ya?ml)$
        pass_filenames: false
